<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
<div class="wrapper">
<form action="{{ url_for('login') }}" method="post">
<h1>Login</h1>
<p class="subtitle">Login to access notes, videos, and quizzes.</p>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-messages">
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="input-box">
<input type="text" name="username" placeholder="Username" required><i class='bx bx-user'></i>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required><i class='bx bx-lock-alt'></i>
</div>

<button type="submit" class="btn">Login</button>

<div class="register-link">
<p>Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
<p><a href="{{ url_for('index') }}">Back to Home</a></p>
</div>
</form>
</div>
</body>
</html>
